<main>
  <section class="login_wrapper">
    <div class="container-fluid login_bg_container">
      <div class="row">
        <div class="col-xl-6 col-lg-6 col-md-6 col-sm-12 p-0 h-100">
          <div class="form_video">
            <div class="login_bg">
              <video width="100%" height="100%" autoplay>
                <source
                  src="../../../assets/img/dashboard/login-video.mp4"
                  type="video/mp4"
                />
              </video>
            </div>
          </div>
        </div>
        <div
          class="col-xl-6 col-lg-6 col-md-6 col-sm-12 main_login position-relative z-3 h-100"
        >
          <div>
            <img
              src="../../../assets/img/dashboard/login-logo.svg"
              class="main_logo"
              alt=""
            />

            <h1 class="login_title">Sign up</h1>
            <form class="login_form" [formGroup]="registerForm" (ngSubmit)="UseRegister(registerForm.value, clearaddform)" #clearaddform="ngForm">
              <div class="login_form_wrapper">
                <div class="form-floating login_form mb-3">
                  <mat-form-field class="example-full-width">
                    <input matInput placeholder="Full Name" formControlName="name" />
                    <mat-error *ngIf="registerForm.get('name')?.hasError('required')">Name is required.</mat-error>
                  </mat-form-field>
                </div>

                <div class="form-floating login_form mb-3">
                  <mat-form-field class="example-full-width">
                    <input
                      type="email"
                      matInput
                      formControlName="email"
                      placeholder="Enter Email"
                    />
                    <mat-error *ngIf="registerForm.get('email')?.hasError('required')">Email is required.</mat-error>
                  </mat-form-field>
                </div>

                <div class="form-floating login_form mb-3">
                  <mat-form-field class="example-full-width">
                    <input matInput placeholder="Mobile Number" formControlName="phone_no" />
                    <mat-error *ngIf="registerForm.get('phone_no')?.hasError('required')">Mobile No is required.</mat-error>
                  </mat-form-field>
                </div>

                <div class="form-floating login_form mb-3">
                  <mat-form-field class="password_field">
                    <input matInput [type]="hide ? 'password' : 'text'" placeholder="Enter Password" formControlName="password" />
                    <a
                      mat-icon-button
                      matSuffix
                      (click)="hide = !hide"
                      [attr.aria-label]="'Hide password'"
                      [attr.aria-pressed]="hide"
                    >
                      <mat-icon>{{
                        hide ? "visibility_off" : "visibility"
                      }}</mat-icon>
                    </a>
                    <mat-error *ngIf="registerForm.get('password')?.hasError('required')">Password is required.</mat-error>
                  </mat-form-field>
                </div>
                <div class="form-floating login_form">
                  <mat-form-field class="password_field">
                    <input matInput [type]="hide ? 'password' : 'text'" placeholder="Confirm Password" formControlName="confirmPassword" />
                    <a mat-icon-button matSuffix (click)="hide = !hide" [attr.aria-label]="'Hide password'" [attr.aria-pressed]="hide">
                      <mat-icon>{{ hide ? "visibility_off" : "visibility" }}</mat-icon>
                    </a>
                    <mat-error *ngIf="registerForm.get('confirmPassword')?.hasError('required')">Confirm Password is required.</mat-error>
                  </mat-form-field>
                </div>
              </div>
            <div class="mt-4">
              <button class="btn submit_btn mb-2">SIGN UP</button>
            </div>
          </form>
            <div>
              <span class="login_route"> Already have an account? </span
              ><a
                routerLink="/login"
                routerLinkActive="router-link-active"
                class="forgot_link"
                >Login
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>
