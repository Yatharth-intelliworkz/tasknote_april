<ngx-spinner bdColor = "rgba(0, 0, 0, 0.3)"  size = "medium" color = "#fff" type = "timer" [fullScreen] = "true"></ngx-spinner>
<div class="row align-items-center mb-4">
  <div class="col-xl-6 col-lg-6 col-md-6 col-sm-12 mb-lg-0 mb-sm-3">
    <div>
      <a [routerLink]="['/company-details', getcompanyId ]" class="me-3"
        ><img
          src="../../../assets/img/dashboard/back-arrow.svg"
          width="35px"
          height="35px"
          alt=""
      /></a>

      <span class="task_table_title">Roles</span>
    </div>
  </div>
  <div class="col-xl-6 col-lg-6 col-md-6 col-sm-12">
    <div class="d-flex align-items-center gap-3 justify-content-end">
      <div class="manage_searchbar">
        <input
          type="text"
          formControlName="searchQueryControl"
          (input)="filterItems($event)"
          class="form-control"
          id="exampleInputEmail1"
          aria-describedby="emailHelp"
          placeholder="Search here..."
        />
        <img
          src="../../../assets/img/dashboard/search-icon.png"
          alt="search"
          class="searchbar_icon"
        />
      </div>
      <div>
        <a
        *ngIf="userpermission?.add !== 0"
          class="add_task_btn"
          data-bs-toggle="modal"
          data-bs-target="#addRoleModal"
        >
          Add New Role
        </a>
      </div>
    </div>
  </div>
</div>

<div class="row">
  <div class="col-xl-4 col-lg-4 col-md-4 col-sm-12 mb-3" *ngFor="let rolelists of rolelist">
    <div class="role_wrapper">
      <div class="d-flex justify-content-between">
        <p class="role_designation">{{ rolelists.name }}</p>
        <div>
          <a
            href="javascript:void(0)"
            data-bs-toggle="modal"
            data-bs-target="#EditRoleModal"
          >
          <img (click)="editroles(rolelists.id)"
          src="../../../assets/img/dashboard/table-edit-icon.svg"
          *ngIf="userpermission?.edit !== 0"
          alt=""
          class="me-4"
        />
          </a>
          <a data-bs-toggle="modal" *ngIf="userpermission?.delete !== 0" data-bs-target="#deleteroleModal" (click)="deleteroleopendialogue(rolelists.id)">
            <img
              src="../../../assets/img/dashboard/table-delete-icon.svg"
              alt=""
            />
          </a>
        </div>
      </div>
      <div class="table-responsive">
        <table class="table role_table">
          <thead>
            <tr>
              <th class="assign_role">Permission</th>
              <th>
                <img
                  src="../../../../assets/img/dashboard/small-plus-icon.svg"
                  alt=""
                />
              </th>
              <th>
                <img
                  src="../../../../assets/img/dashboard/small-edit-icon.svg"
                  alt=""
                />
              </th>
              <th>
                <img
                  src="../../../../assets/img/dashboard/small-delete-icon.svg"
                  alt=""
                />
              </th>
            </tr>
          </thead>
          <tbody class="dream-table">
            <tr>
              <td>Projects</td>
              <td>
                <img *ngIf="rolelist && rolelists.permission[0].add === 1" src="../../../../assets/img/dashboard/correct-icon.svg" alt="" />
                <img *ngIf="rolelist && rolelists.permission[0].add === 0" src="../../../../assets/img/dashboard/cross-icon.svg" alt="" />
              </td>
              <td>
                <img *ngIf="rolelists.permission[0]?.edit === 1" src="../../../../assets/img/dashboard/correct-icon.svg" alt="" />
                <img *ngIf="rolelists.permission[0]?.edit === 0" src="../../../../assets/img/dashboard/cross-icon.svg" alt="" />
              </td>
              <td>
                <img *ngIf="rolelists.permission[0]?.delete === 1" src="../../../../assets/img/dashboard/correct-icon.svg" alt="" />
                <img *ngIf="rolelists.permission[0]?.delete === 0" src="../../../../assets/img/dashboard/cross-icon.svg" alt="" />
              </td>
            </tr>

            <tr>
              <td>Tasks</td>
              <td>
                <img *ngIf="rolelist && rolelists.permission[1].add === 1" src="../../../../assets/img/dashboard/correct-icon.svg" alt=""/>
                <img *ngIf="rolelist && rolelists.permission[1].add === 0" src="../../../../assets/img/dashboard/cross-icon.svg" alt=""/>
              </td>
              <td>
                <img *ngIf="rolelist && rolelists.permission[1].edit === 1" src="../../../../assets/img/dashboard/correct-icon.svg" alt=""/>
                <img *ngIf="rolelist && rolelists.permission[1].edit === 0" src="../../../../assets/img/dashboard/cross-icon.svg" alt=""/>
              </td>
              <td>
                <img *ngIf="rolelist && rolelists.permission[1].delete === 1" src="../../../../assets/img/dashboard/correct-icon.svg" alt=""/>
                <img *ngIf="rolelist && rolelists.permission[1].delete === 0" src="../../../../assets/img/dashboard/cross-icon.svg" alt=""/>
              </td>
            </tr>
            <tr>
              <td>Discussion</td>
              <td>
                <img *ngIf="rolelist && rolelists.permission[2].add === 1" src="../../../../assets/img/dashboard/correct-icon.svg" alt=""/>
                <img *ngIf="rolelist && rolelists.permission[2].add === 0" src="../../../../assets/img/dashboard/cross-icon.svg" alt=""/>
              </td>
              <td>
                <img *ngIf="rolelist && rolelists.permission[2].edit === 1" src="../../../../assets/img/dashboard/correct-icon.svg" alt=""/>
                <img *ngIf="rolelist && rolelists.permission[2].edit === 0" src="../../../../assets/img/dashboard/cross-icon.svg" alt=""/>
              </td>
              <td>
                <img *ngIf="rolelist && rolelists.permission[2].delete === 1" src="../../../../assets/img/dashboard/correct-icon.svg" alt=""/>
                <img *ngIf="rolelist && rolelists.permission[2].delete === 0" src="../../../../assets/img/dashboard/cross-icon.svg" alt=""/>
              </td>
            </tr>
            <tr>
              <td>Note</td>
              <td>
                <img *ngIf="rolelist && rolelists.permission[3].add === 1" src="../../../../assets/img/dashboard/correct-icon.svg" alt=""/>
                <img *ngIf="rolelist && rolelists.permission[3].add === 0" src="../../../../assets/img/dashboard/cross-icon.svg" alt=""/>
              </td>
              <td>
                <img *ngIf="rolelist && rolelists.permission[3].edit === 1" src="../../../../assets/img/dashboard/correct-icon.svg" alt=""/>
                <img *ngIf="rolelist && rolelists.permission[3].edit === 0" src="../../../../assets/img/dashboard/cross-icon.svg" alt=""/>
              </td>
              <td>
                <img *ngIf="rolelist && rolelists.permission[3].delete === 1" src="../../../../assets/img/dashboard/correct-icon.svg" alt=""/>
                <img *ngIf="rolelist && rolelists.permission[3].delete === 0" src="../../../../assets/img/dashboard/cross-icon.svg" alt=""/>
              </td>
            </tr>
            <tr>
              <td>Organization Management</td>
              <td>
                <img *ngIf="rolelist && rolelists.permission[4].add === 1" src="../../../../assets/img/dashboard/correct-icon.svg" alt=""/>
                <img *ngIf="rolelist && rolelists.permission[4].add === 0" src="../../../../assets/img/dashboard/cross-icon.svg" alt=""/>
              </td>
              <td>
                <img *ngIf="rolelist && rolelists.permission[4].edit === 1" src="../../../../assets/img/dashboard/correct-icon.svg" alt=""/>
                <img *ngIf="rolelist && rolelists.permission[4].edit === 0" src="../../../../assets/img/dashboard/cross-icon.svg" alt=""/>
              </td>
              <td>
                <img *ngIf="rolelist && rolelists.permission[4].delete === 1" src="../../../../assets/img/dashboard/correct-icon.svg" alt=""/>
                <img *ngIf="rolelist && rolelists.permission[4].delete === 0" src="../../../../assets/img/dashboard/cross-icon.svg" alt=""/>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- add Role Modal -->
<div
  class="modal fade"
  id="addRoleModal"
  tabindex="-1"
  aria-labelledby="exampleModalLabel"
  aria-hidden="true"
>
  <div class="modal-dialog modal-md">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title new_task_title" id="exampleModalLabel">
          Add New Role
        </h5>
        <img
          src="../../../assets/img/dashboard/popup-close-btn.svg"
          data-bs-dismiss="modal"
          aria-label="Close"
          alt=""
          class="popup_close_btn_role_add"
        />
      </div>
      <div class="modal-body">
          <form role="form" #submitForm="ngForm" (ngSubmit)="addrole(submitForm.value, submitForm)">
          <div class="form_field mb-3">
            <mat-form-field>
              <input matInput ngModel name="name" placeholder="Role Name" />
            </mat-form-field>
          </div>
          <div>
            <section class="example-section">
              <span class="example-list-section">
                <!-- <mat-checkbox
                  class="example-margin"
                  [checked]="allComplete"
                  (change)="setAll($event.checked)"
                >
                  {{ task.name }}
                </mat-checkbox> -->
              </span>

              <div class="table-responsive">
                <table class="table role_table">
                  <thead>
                    <tr>
                      <th>Permission</th>
                      <th>Add</th>
                      <th>Edit</th>
                      <th>Delete</th>
                    </tr>
                  </thead>
                  <tbody class="dream-table">

                    <tr *ngFor="let task of tasks">
                      <td>{{ task.name }}</td>
                      <td>
                        <mat-checkbox [(ngModel)]="task.operations.add" name="add{{task.name}}"></mat-checkbox>
                      </td>
                      <td>
                        <mat-checkbox [(ngModel)]="task.operations.edit" name="edit{{task.name}}"></mat-checkbox>
                      </td>
                      <td>
                        <mat-checkbox [(ngModel)]="task.operations.delete" name="delete{{task.name}}"></mat-checkbox>
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </section>
          </div>
          <div class="row">
            <div class="col-xl-4 col-lg-4 col-md-4 col-sm-12">
              <button class="btn submit_btn">Submit</button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
<!-- End Edit Role Modal -->
<!-- Edit Role Modal -->
<div class="modal fade" id="EditRoleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-md">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title new_task_title" id="exampleModalLabel">
          Edit Role
        </h5>
        <img
          src="../../../assets/img/dashboard/popup-close-btn.svg"
          data-bs-dismiss="modal"
          aria-label="Close"
          alt=""
          class="popup_close_btn_edit"
        />
      </div>
      <div class="modal-body">
        <form [formGroup]="editForm">
          <div class="form_field mb-3">
            <mat-form-field>
              <input matInput [(ngModel)]="roleslistedit.name" formControlName="name" placeholder="Role Name" />
            </mat-form-field>
            <input matInput hidden="true" [(ngModel)]="roleslistedit.id"   formControlName="roleId" />
          </div>
          <div>
            <section class="example-section">
              <span class="example-list-section">
                <!-- <mat-checkbox
                  class="example-margin"
                  [checked]="allComplete"
                  (change)="setAll($event.checked)"
                >
                  {{ rolelist.name }}
                </mat-checkbox> -->
              </span>

              <div class="table-responsive">
                <table class="table role_table">
                  <thead>
                    <tr>
                      <th>Permission</th>
                      <th>Add</th>
                      <th>Edit</th>
                      <th>Delete</th>
                    </tr>
                  </thead>
                  <tbody class="dream-table">
                      <tr *ngFor="let permission of editTask">
                        <td>{{ permission.name }}</td>
                        <td>
                          <mat-checkbox [(ngModel)]="permission.permission.add" formControlName="add{{permission.name}}"></mat-checkbox>
                        </td>
                        <td>
                          <mat-checkbox [(ngModel)]="permission.permission.edit" formControlName="edit{{permission.name}}"></mat-checkbox>
                        </td>
                        <td>
                          <mat-checkbox [(ngModel)]="permission.permission.delete" formControlName="delete{{permission.name}}"></mat-checkbox>
                        </td>
                      </tr>
                    </tbody>
                </table>
              </div>
            </section>
          </div>
          <div class="row">
            <div class="col-xl-4 col-lg-4 col-md-4 col-sm-12">
              <button class="btn submit_btn" (click)="UpdateRoles()">Submit</button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>



<div
  class="modal fade"
  id="deleteroleModal"
  tabindex="-1"
  aria-labelledby="exampleModalLabel"
  aria-hidden="true"
>
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title new_task_title" id="exampleModalLabel">
          Delete Role
        </h5>
        <img
        src="../../../assets/img/dashboard/popup-close-btn.svg"
        data-bs-dismiss="modal"
        aria-label="Close"
        alt=""
        class="popup_close_btn_delete_role"
        />
      </div>
      <div class="modal-body">
        <h2 class="task_complete_title">
          Are you sure you want to delete this role?
        </h2>
        <div class="row">
          <div class="col-xl-4 col-lg-4 col-md-4 col-sm-12">
            <button class="btn submit_btn" (click)="confirmDelete()">Yes</button>
            <!-- <button class="btn cancel_btn" (click)="dismissModal()">No</button> -->
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
