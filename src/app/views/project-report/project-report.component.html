<main>
  <section class="user_task_wrapper">
    <div class="container-fluid">
      <div class="mb-4">
            <div class="top_title_inner_flex">
              <div class="d-flex align-items-center gap-3">
                <a routerLink="/report">
                  <img src="../../../assets/img/dashboard/back-arrow.svg" alt="" width="30px" height="30px" /></a>

                <p class="report_inner_title">Project Report</p>
              </div>
              <div class="d-flex align-items-center gap-3">
                <!-- <a class="add_task_btn" data-bs-toggle="modal" data-bs-target="#DiscussionModal">
                  <span>
                    <img src="../../../assets/img/dashboard/save-report.png" alt="save-report" width="22px"
                      height="22px" /></span>
                  Save Report</a> -->
                <!-- <a class="add_task_btn" (click)="exportexcel()" data-bs-toggle="modal" *ngIf="Isdisplay == 1"
                  data-bs-target="#DiscussionModal">
                  <span>
                    <img src="../../../assets/img/dashboard/download-icon.png" alt="download" /></span>
                  Download</a> -->
              </div>
            </div>
      </div>

      <div class="report_view_pan mb-4">
        <div class="card">
          <div class="card-body">
            <mat-accordion class="example-headers-align">
              <mat-expansion-panel [expanded]="isPanelOpen">
                <mat-expansion-panel-header>
                  <mat-panel-title> Charts </mat-panel-title>
                </mat-expansion-panel-header>
                <div class="row">
                  <div class="col-4 text-center">
                    <!-- <div class="total_project_wrapper">
                      <p class="total_project">{{projectsreport?.totalProject}}</p>
                    </div> -->

                    <circle-progress
                    [percent]=(projectsreport?.totalProject)
                    [radius]="100"
                    [space]="-14"
                    [outerStrokeWidth]="14"
                    [showInnerStroke]="false"
                    [innerStrokeWidth]="0"
                    [innerStrokeColor]="'#1c1f66'"
                    [innerStrokeColor]="'#FDB900'"
                    [backgroundStrokeWidth]="0"
                    [backgroundColor]="'#1c1f66'"
                    [outerStrokeColor]="'#1c1f66'"
                    [outerStrokeGradient]="false"
                    [outerStrokeGradientStopColor]="'#1c1f66'"
                    [animation]="true"
                    [animationDuration]="300"
                    [showUnits]="false"
                    [showSubtitle]="false"
                    [titleColor] ="'#fff'"
                    height="100px"
                  ></circle-progress>

                    <p class="projects_inner_title">Total Projects</p>
                  </div>
                  <div class="col-4 text-center">
                    <div>
                      <circle-progress
                        [percent]="(projectsreport?.totalTaskIncompleted /projectsreport?.totalTask) * 100 || 0"
                        [radius]="100" [space]=-14 [outerStrokeWidth]="16" [showInnerStroke]=true [innerStrokeWidth]=14
                        [innerStrokeColor]="'#ddd'" [outerStrokeColor]="'red'" [outerStrokeGradient]=false
                        [outerStrokeGradientStopColor]="'#1AD99D'" [animation]="true" [animationDuration]="300"
                        [showUnits]=false [showSubtitle]=false
                        [title]="projectsreport?.totalTaskIncompleted + '/' + projectsreport?.totalTask"
                        height="100px"></circle-progress>
                      <p class="projects_inner_title">Task In-completed</p>
                    </div>
                  </div>
                  <div class="col-4 text-center">
                    <div>
                      <circle-progress
                        [percent]="(projectsreport?.totalTaskCompleted /projectsreport?.totalTask) * 100 || 0 "
                        [radius]="100" [space]=-14 [outerStrokeWidth]="16" [showInnerStroke]="true"
                        [innerStrokeWidth]="14" [innerStrokeColor]="'#D8D9DD'" [outerStrokeColor]="'green'"
                        [outerStrokeGradient]="false" [outerStrokeGradientStopColor]="'#1AD99D'" [animation]="true"
                        [animationDuration]="300" [showUnits]="false" [showSubtitle]="false"
                        [title]="projectsreport?.totalTaskCompleted + '/' + projectsreport?.totalTask" height="100px"
                        style="height: 150px;">
                      </circle-progress>
                      <p class="projects_inner_title">Task Completed</p>
                    </div>
                  </div>
                </div>



              </mat-expansion-panel>
            </mat-accordion>
          </div>
        </div>
      </div>

      <div class="report_view_pan mb-4">
        <div class="card">
          <div class="card-body">

            <mat-accordion class="example-headers-align">
              <mat-expansion-panel [expanded]="isPanelOpen">
                <mat-expansion-panel-header>
                  <mat-panel-title> Projects Report </mat-panel-title>
                </mat-expansion-panel-header>

                <!-- <div class="row my-2">

                  <div class="d-flex gap-3 align-items-center justify-content-end">
                    <mat-form-field class="filter_search">
                      <input matInput (keyup)="applyFilter($event)" placeholder="Search...." #input />
                    </mat-form-field>
                  </div>
                </div> -->

                <mat-tab-group mat-stretch-tabs="false" mat-align-tabs="start" *ngIf="projectsreport">
                  <mat-tab *ngFor="let project of projectsreport.projectList" label="{{ project.name.toUpperCase() }}">
                    <div class="m-3">
                      <div class="row align-items-center">
                        <div class="col-6">
                          <div class="table-responsive mb-3">
                            <table class="project_table_data">
                              <tbody>
                                <tr>
                                  <td>Project Name:</td>
                                  <td>{{ project.name }}</td>
                                </tr>
                                <!-- <tr>
                                  <td>Client Name:</td>
                                  <td>{{ project.clientName }}</td>
                                </tr> -->
                                <tr>
                                  <td>Start Date:</td>
                                  <td>{{ project.startDate }}</td>
                                </tr>
                                <tr>
                                  <td>End Date:</td>
                                  <td>{{ project.endDate }}</td>
                                </tr>
                              </tbody>
                            </table>
                          </div>
                          <a class="add_task_btn d-inline mt-2" (click)="generatereport( project.id )" data-bs-toggle="modal" *ngIf="Isdisplay == 1"
                          data-bs-target="#DiscussionModal">
                          <span>
                            <img src="../../../assets/img/dashboard/download-icon.png" alt="download" /></span>
                          Download</a>
                        </div>
                      
                        <div class="col-6">
                          <div class="text-center">
                            <circle-progress [percent]="(project?.taskCompleted / project?.projectTotalTask) * 100 || 0"
                              [radius]="100" [space]="-14" [outerStrokeWidth]="16" [showInnerStroke]="true"
                              [innerStrokeWidth]="14" [innerStrokeColor]="'#ddd'" [outerStrokeColor]="'red'"
                              [outerStrokeGradient]="false" [outerStrokeGradientStopColor]="'#1AD99D'"
                              [animation]="true" [animationDuration]="300" [showUnits]="false" [showSubtitle]="false"
                              [title]="project?.taskCompleted + '/' + project?.taskIncompleted" height="50px">
                            </circle-progress>

                          </div>
                        </div>



                        <!-- No data message -->
                        <div *ngIf="!project.name && !project.clientName && !project.startDate && !project.endDate">
                          No data available for this project.
                        </div>
                      </div>
                    </div>
                  </mat-tab>
                </mat-tab-group>



              </mat-expansion-panel>
            </mat-accordion>
          </div>
        </div>
      </div>

    </div>
  </section>
</main>
