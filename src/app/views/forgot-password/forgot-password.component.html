<ngx-spinner bdColor = "rgba(0, 0, 0, 0.8)" size = "medium" color = "#fff" type = "timer" [fullScreen] = "true"></ngx-spinner>
<main>
  <section class="login_wrapper">
    <div class="container-fluid login_bg_container">
      <div class="row align-items-center">
        <div class="col-xl-6 col-lg-6 col-md-6 col-sm-12 p-0 h-100">
          <div class="form_video">
            <div class="login_bg">
              <video width="100%" height="100%" autoplay>
                <source src="../../../assets/img/dashboard/login-video.mp4" type="video/mp4" />
              </video>
            </div>
          </div>
        </div>
        <div class="col-xl-6 col-lg-6 col-md-6 col-sm-12 main_login position-relative z-3 h-100">
          <div class="pt-3">
            <img src="../../../assets/img/dashboard/login-logo.svg" class="main_logo" alt="" />

            <h1 class="login_title">Reset password</h1>
            <p class="login_content">
              Enter your registered email address we'll send you to reset password your mail.
            </p>
            <form class="login_form" [formGroup]="groupForm" (ngSubmit)="onSubmit(groupForm.value)">
              <div class="login_form_wrapper">
                <div class="form-floating login_form mb-3">
                  <mat-form-field class="example-full-width">
                    <input type="email" matInput formControlName="email" #input name="email"
                      [errorStateMatcher]="matcher" placeholder="Enter Email">
                    <mat-error *ngIf="emailFormControl.hasError('email') && !emailFormControl.hasError('required')">
                      Please enter a valid email address
                    </mat-error>
                    <mat-error *ngIf="emailFormControl.hasError('required')">
                      Email is <strong>required</strong>
                    </mat-error>
                  </mat-form-field>
                </div>
              </div>
              <div class="d-flex align-items-center mt-4 ">
                <button type="submit" class="btn submit_btn mb-2">Send Link</button>
              </div>
            </form>
            <div>
              <span class="login_route"> Go back to </span><a routerLink="/login" routerLinkActive="router-link-active"
                class="forgot_link">Login
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>
