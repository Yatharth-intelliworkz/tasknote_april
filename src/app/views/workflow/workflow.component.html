<main>
  <section class="user_task_wrapper">
    <div class="container-fluid">
      <form>
        <div class="row justify-content-center">
          <div class="col-6" *ngIf="isowner == 1">
            <ng-select [items]="team1" bindLabel="item_text" bindValue="item_id" class="client_list" placeholder="Select User" (change)="workPendingTaskListOwner($event)">
            </ng-select>
          </div>
          <div class="col-6">
            <div class="justify-content-center text-center">
              <h3 class="comman_task_title">{{ username }}</h3>
              <h3 class="comman_task_title">{{ today | date : "EEEE, MMMM d, Y" }}</h3>
            </div>
          </div>
        </div>
      </form>

      <div class="table-responsive mt-2">
        <ag-grid-angular class="ag-theme-quartz worlflow" style="width: 100%; height: 100%;" [columnDefs]="columnDefs"
          [rowData]="rowData" [defaultColDef]="defaultColDef" (cellValueChanged)="onCellValueChanged($event)">
        </ag-grid-angular>
      </div>
  </div>
  </section>
  <div class="modal fade" id="completeTaskModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title new_task_title" id="exampleModalLabel">
            Forward Task
          </h5>
          <img src="../../../assets/img/dashboard/popup-close-btn.svg" data-bs-dismiss="modal" aria-label="Close" alt=""
            class="popup_close_btn_delete_project" />
        </div>
        <div class="modal-body">
          <div class="task_multiselect">
            <ng-select [items]="filteredTeam1" bindLabel="item_text" bindValue="item_id" class="client_list" placeholder="Select User"  (change)="updateassignes($event)">
            </ng-select>
          </div>
          <div class="row">
            <div class="col-xl-4 col-lg-4 col-md-4 col-sm-12">
              <button class="submit_btn" data-bs-dismiss="modal" aria-label="Close">Yes</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  
</main>
