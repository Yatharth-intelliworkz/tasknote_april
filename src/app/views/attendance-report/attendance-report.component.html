<main>
  <section class="user_task_wrapper">
    <div class="container-fluid">
      <div class="mb-4">
        <div class="top_title_inner_flex">
          <div class="d-flex align-items-center gap-3">
            <a routerLink="/report">
              <img
                src="../../../assets/img/dashboard/back-arrow.svg"
                alt=""
                width="30px"
                height="30px"
            /></a>

            <p class="report_inner_title">Attendance Report</p>
          </div>
          <!-- <div class="d-flex align-items-center gap-3">
              <a class="add_task_btn" (click)="exportexcel()" data-bs-toggle="modal" *ngIf="Isdisplay == 1"
                data-bs-target="#DiscussionModal">
                <span>
                  <img src="../../../assets/img/dashboard/download-icon.png" alt="download" /></span>
                Download </a>
            </div> -->
        </div>
      </div>

      <!-- tabs  view -->

      <div class="mb-4">
        <form [formGroup]="taskForm" (ngSubmit)="onSubmit()">
          <div class="multiselect_main">
            <div class="task_multiselect">
              <ng-select
                [items]="team1"
                bindLabel="name"
                bindValue="id"
                placeholder="User"
                formControlName="userID"
                [multiple]="false"
                class="client_list"
              >
              </ng-select>
            </div>
            <button class="add_task_btn" type="submit">Search</button>
          </div>
        </form>
      </div>
      <div class="table-responsive mt-2">
        <ag-grid-angular
          class="ag-theme-quartz worlflow"
          style="width: 100%; height: 100%"
          [columnDefs]="columnDefs"
          [rowData]="rowData"
          [defaultColDef]="defaultColDef"
        >
        </ag-grid-angular>
      </div>
    </div>
  </section>
</main>
