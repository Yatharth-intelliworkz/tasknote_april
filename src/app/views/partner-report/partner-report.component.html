<main>
    <section class="user_task_wrapper">
        <div class="container-fluid">
            <div class="mb-4">
                <div class="top_title_inner_flex">
                    <div class="d-flex align-items-center gap-3">
                        <a routerLink="/report">
                            <img src="../../../assets/img/dashboard/back-arrow.svg" alt="" width="30px"
                                height="30px" /></a>

                        <p class="report_inner_title">Partner Report</p>
                    </div>
                    <div class="d-flex align-items-center gap-3">
                        <!-- <a class="add_task_btn" data-bs-toggle="modal" data-bs-target="#DiscussionModal">
                    <span>
                      <img src="../../../assets/img/dashboard/save-report.png" alt="save-report" width="22px"
                        height="22px" /></span>
                    Save Report</a> -->
                        <a class="add_task_btn" (click)="exportexcel()" data-bs-toggle="modal" *ngIf="Isdisplay == 1"
                    data-bs-target="#DiscussionModal">
                    <span>
                      <img src="../../../assets/img/dashboard/download-icon.png" alt="download" /></span>
                    Download</a>
                    </div>
                </div>
            </div>
        </div>



        <div class="mb-4">
        <form (submit)="generatereport()" role="form" [formGroup]="submitForm">
                <div class="multiselect_main">
                    <div class="task_multiselect">
                        <ng-select [items]="clientslistData" bindLabel="name" bindValue="id"
                            placeholder="Select Partner" formControlName="userID" [multiple]="true" class="client_list">
                        </ng-select>
                    </div>

                    <mat-form-field>
                        <mat-date-range-input [formGroup]="range" [rangePicker]="picker" [ariaReadOnly]="true">
                            <input matStartDate formControlName="start" placeholder="Start Date">
                            <input matEndDate formControlName="due_date" placeholder="End Date">
                        </mat-date-range-input>
                        <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
                        <mat-date-range-picker #picker></mat-date-range-picker>
                    </mat-form-field>

                    <button class="add_task_btn">Search</button>
                </div>
            </form>
        </div>
    </section>

    <section>
        <div class="table-responsive mt-2">
          <table border="1" style="width: 100%; border-collapse: collapse;" class="table border">
            <thead>
              <tr>
                <!-- Client Name -->
                <th (click)="sortData('clientName')" style="cursor: pointer;">
                  Client Name
                  <svg xmlns="http://www.w3.org/2000/svg" width="15" height="11" viewBox="0 0 18 11" fill="none">
                    <path d="M9 0L17 10H1L9 0Z" [class.active]="currentSort === 'clientName' && !isDescending" />
                    <path d="M9 11L17 1H1L9 11Z" [class.active]="currentSort === 'clientName' && isDescending" />
                  </svg>
                </th>
                <!-- Task Description -->
                <th (click)="sortData('description')" style="cursor: pointer;">
                  Task Description
                  <svg xmlns="http://www.w3.org/2000/svg" width="15" height="11" viewBox="0 0 18 11" fill="none">
                    <path d="M9 0L17 10H1L9 0Z" [class.active]="currentSort === 'description' && !isDescending" />
                    <path d="M9 11L17 1H1L9 11Z" [class.active]="currentSort === 'description' && isDescending" />
                  </svg>
                </th>
                <!-- Checklist Name -->
                <th (click)="sortData('checklistName')" style="cursor: pointer;">
                  Checklist Name
                  <svg xmlns="http://www.w3.org/2000/svg" width="15" height="11" viewBox="0 0 18 11" fill="none">
                    <path d="M9 0L17 10H1L9 0Z" [class.active]="currentSort === 'checklistName' && !isDescending" />
                    <path d="M9 11L17 1H1L9 11Z" [class.active]="currentSort === 'checklistName' && isDescending" />
                  </svg>
                </th>
                <!-- Task Completed -->
                <th (click)="sortData('taskCompleted')" style="cursor: pointer;">
                  Task Completed
                  <svg xmlns="http://www.w3.org/2000/svg" width="15" height="11" viewBox="0 0 18 11" fill="none">
                    <path d="M9 0L17 10H1L9 0Z" [class.active]="currentSort === 'taskCompleted' && !isDescending" />
                    <path d="M9 11L17 1H1L9 11Z" [class.active]="currentSort === 'taskCompleted' && isDescending" />
                  </svg>
                </th>
                <!-- Checklist Completed -->
                <th (click)="sortData('checklistCompleted')" style="cursor: pointer;">
                  Checklist Completed
                  <svg xmlns="http://www.w3.org/2000/svg" width="15" height="11" viewBox="0 0 18 11" fill="none">
                    <path d="M9 0L17 10H1L9 0Z" [class.active]="currentSort === 'checklistCompleted' && !isDescending" />
                    <path d="M9 11L17 1H1L9 11Z" [class.active]="currentSort === 'checklistCompleted' && isDescending" />
                  </svg>
                </th>
              </tr>
            </thead>
            <tbody>
              <ng-container *ngFor="let client of clients">
                <tr>
                  <td (click)="toggleClient(client)" style="cursor: pointer;">
                    <div class="d-flex gap-2 align-items-center"><b>{{ client.clientName }}</b>
                      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="11" viewBox="0 0 18 11" fill="none" *ngIf="client.taskList?.length >= 1">
                        <path d="M17 0.781968L9.07501 9.21826L1.33701 0.781968" stroke="black" stroke-width="1.5" />
                      </svg>
                    </div>
                  </td>
                  <td colspan="4"></td>
                </tr>
                <ng-container *ngIf="client.isExpanded">
                  <ng-container *ngFor="let task of client.taskList">
                    <tr>
                      <td></td>
                      <td (click)="toggleTask(task)" style="cursor: pointer;">
                        <div class="d-flex gap-2 align-items-center">
                          <p class="m-0">{{ task.description }}</p>
                          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="11" viewBox="0 0 18 11" fill="none" *ngIf="task.CheckList?.length >= 1">
                            <path d="M17 0.781968L9.07501 9.21826L1.33701 0.781968" stroke="black" stroke-width="1.5" />
                          </svg>
                        </div>
                      </td>
                      <td colspan="3"></td>
                    </tr>
                    <ng-container *ngIf="task.isExpanded">
                      <tr *ngFor="let checklist of task.CheckList">
                        <td colspan="2"></td>
                        <td>{{ checklist.checklistName }}</td>
                        <td>{{ task.completed ? 'Yes' : 'No' }}</td>
                        <td>{{ checklist.completed ? 'Yes' : 'No' }}</td>
                      </tr>
                    </ng-container>
                  </ng-container>
                </ng-container>
              </ng-container>
            </tbody>
          </table>
          
              
              
        </div>
    </section>


</main>
